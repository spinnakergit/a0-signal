<html>
<head><title>Signal</title></head>
<body>
    <div x-data x-init="
        if (!config.api) config.api = {};
        if (!config.api.mode) config.api.mode = 'integrated';
        if (!config.defaults) config.defaults = {};
        if (!config.memory) config.memory = {};
        if (!config.polling) config.polling = {};
        if (!config.chat_bridge) config.chat_bridge = {};
        if (!config.security) config.security = {};
        if (config.allowed_contacts === undefined) config.allowed_contacts = [];
        if (config.chat_bridge.allowed_numbers === undefined) config.chat_bridge.allowed_numbers = [];
    ">
        <template x-if="config">
            <div>
                <!-- Installation Mode -->
                <div class="section-title">Installation Mode</div>
                <div class="section-description">
                    <strong>Integrated:</strong> signal-cli runs natively inside the Agent Zero container (simplest).
                    <strong>External:</strong> uses a separate <code>signal-cli-rest-api</code> Docker container.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Mode</div>
                        <div class="field-description">How signal-cli connects to Agent Zero.</div>
                    </div>
                    <div class="field-control">
                        <select x-model="config.api.mode">
                            <option value="integrated">Integrated (built-in)</option>
                            <option value="external">External (Docker container)</option>
                        </select>
                    </div>
                </div>

                <!-- Signal API Connection -->
                <div class="section-title">Signal API Connection</div>
                <div class="section-description" x-show="config.api.mode === 'integrated'">
                    The local signal-cli daemon runs on <code>127.0.0.1:8080</code>. Usually no configuration needed.
                </div>
                <div class="section-description" x-show="config.api.mode === 'external'">
                    Requires a running <code>signal-cli-rest-api</code> instance. Keep the API on a private Docker network.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">API Base URL</div>
                        <div class="field-description" x-show="config.api.mode === 'integrated'">Leave blank for default (127.0.0.1:8080).</div>
                        <div class="field-description" x-show="config.api.mode === 'external'">Internal Docker URL (e.g. http://signal-api:8080).</div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.api.base_url"
                            :placeholder="config.api.mode === 'external' ? 'http://signal-api:8080' : 'http://127.0.0.1:8080'" />
                    </div>
                </div>

                <div class="field" x-show="config.api.mode === 'external'">
                    <div class="field-label">
                        <div class="field-title">API Auth Token (Optional)</div>
                        <div class="field-description">Only needed if using a secured proxy.</div>
                    </div>
                    <div class="field-control">
                        <input type="password" x-model="config.api.auth_token" placeholder="Bearer token" />
                    </div>
                </div>

                <!-- Phone Number -->
                <div class="section-title">Registered Phone Number</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Signal Phone Number</div>
                        <div class="field-description">E.164 format (e.g. +1234567890). The number registered/linked with signal-cli. Use a dedicated number.</div>
                    </div>
                    <div class="field-control">
                        <input type="text" x-model="config.phone_number" placeholder="+1234567890" />
                    </div>
                </div>

                <!-- Access Control -->
                <div class="section-title">Access Control</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Allowed Contacts</div>
                        <div class="field-description">Phone numbers or group IDs, one per line. Leave empty to allow all (use with caution).</div>
                    </div>
                    <div class="field-control">
                        <textarea rows="3"
                            :value="(config.allowed_contacts || []).join('\n')"
                            @input="config.allowed_contacts = $event.target.value.split('\n').map(s => s.trim()).filter(Boolean)"
                            placeholder="Leave empty for all contacts"></textarea>
                    </div>
                </div>

                <!-- Memory -->
                <div class="section-title">Memory</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-save summaries</div>
                        <div class="field-description">Automatically save conversation summaries to agent memory.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.memory.auto_save_summaries"
                                x-init="if (config.memory.auto_save_summaries === undefined) config.memory.auto_save_summaries = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Polling -->
                <div class="section-title">Message Polling</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Poll interval (seconds)</div>
                        <div class="field-description">How often to check for new messages when the bridge is running (5-300).</div>
                    </div>
                    <div class="field-control">
                        <input type="number" min="5" max="300" x-model.number="config.polling.interval_seconds"
                            x-init="if (!config.polling.interval_seconds) config.polling.interval_seconds = 30" />
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-analyze image attachments</div>
                        <div class="field-description">Automatically analyze image attachments when processing messages.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.polling.auto_analyze_images"
                                x-init="if (config.polling.auto_analyze_images === undefined) config.polling.auto_analyze_images = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <!-- Chat Bridge -->
                <div class="section-title">Chat Bridge</div>
                <div class="section-description">
                    Route Signal messages through Agent Zero's LLM. Contacts are managed via the <code>signal_chat</code> tool.
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Auto-start on agent startup</div>
                        <div class="field-description">Automatically connect the bridge when Agent Zero starts.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.chat_bridge.auto_start" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Allowed Bridge Numbers</div>
                        <div class="field-description">Only these numbers will get responses. Leave empty to use allowed contacts list.</div>
                    </div>
                    <div class="field-control">
                        <textarea rows="2"
                            :value="(config.chat_bridge.allowed_numbers || []).join('\n')"
                            @input="config.chat_bridge.allowed_numbers = $event.target.value.split('\n').map(s => s.trim()).filter(Boolean)"
                            placeholder="One phone number per line"></textarea>
                    </div>
                </div>

                <!-- Elevated Mode -->
                <div class="section-title">Elevated Mode (2FA)</div>
                <div class="section-description">
                    When enabled, authenticated users can unlock full Agent Zero access from Signal using <code>!auth &lt;key&gt;</code>.
                    Default mode is restricted (chat only, no tools).
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Allow elevated mode</div>
                        <div class="field-description">Grants authenticated users full agent access including code execution and file operations.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.chat_bridge.allow_elevated" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <template x-if="config.chat_bridge.allow_elevated">
                    <div>
                        <div style="background: var(--bg-warning, #fce4ec); border: 1px solid var(--border-warning, #ef9a9a); border-radius: 6px; padding: 10px; margin-bottom: 12px;">
                            <div style="font-size: 12px; font-weight: 700; color: var(--text-error, #c62828); margin-bottom: 4px;">Security Notice</div>
                            <div style="font-size: 11px; color: var(--text-error, #b71c1c); line-height: 1.5;">
                                Elevated mode grants full access to Agent Zero. Use a dedicated Signal number, define allowed contacts, and use short session timeouts.
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Auth Key</div>
                                <div class="field-description">Users send <code>!auth &lt;key&gt;</code> via Signal to elevate. Share this key securely (in person or via E2E encrypted channel).</div>
                            </div>
                            <div class="field-control" style="display: flex; gap: 6px; align-items: center;">
                                <input type="text" x-model="config.chat_bridge.auth_key" readonly
                                    style="font-family: monospace; flex: 1;" />
                                <button class="btn btn-field" @click="
                                    (globalThis.fetchApi || fetch)('/api/plugins/signal/signal_config_api', {
                                        method: 'POST',
                                        headers: {'Content-Type': 'application/json'},
                                        body: JSON.stringify({action: 'generate_auth_key'})
                                    }).then(r => r.json()).then(d => { if (d.auth_key) config.chat_bridge.auth_key = d.auth_key; })
                                ">Regenerate</button>
                                <button class="btn btn-field" @click="
                                    navigator.clipboard.writeText(config.chat_bridge.auth_key || '').then(() => {
                                        $event.target.textContent = 'Copied!';
                                        setTimeout(() => $event.target.textContent = 'Copy', 2000);
                                    })
                                ">Copy</button>
                            </div>
                        </div>

                        <div class="field">
                            <div class="field-label">
                                <div class="field-title">Session Timeout</div>
                                <div class="field-description">How long elevated sessions last before requiring re-authentication.</div>
                            </div>
                            <div class="field-control">
                                <select x-model.number="config.chat_bridge.session_timeout"
                                    x-init="if (config.chat_bridge.session_timeout === undefined) config.chat_bridge.session_timeout = 3600">
                                    <option value="1800">30 minutes</option>
                                    <option value="3600">1 hour</option>
                                    <option value="7200">2 hours</option>
                                    <option value="14400">4 hours</option>
                                    <option value="28800">8 hours</option>
                                    <option value="0">Never expire</option>
                                </select>
                            </div>
                        </div>

                        <div x-show="config.chat_bridge.session_timeout == 0"
                            style="background: var(--bg-warning, #fff3e0); border: 1px solid var(--border-warning, #ffcc80); border-radius: 6px; padding: 8px; font-size: 11px; color: var(--text-warning, #e65100);">
                            <strong>Security warning:</strong> "Never expire" means an elevated session stays active until the bridge restarts or the user sends <code>!deauth</code>. If the auth key is compromised, the attacker retains full agent access indefinitely.
                        </div>
                    </div>
                </template>

                <!-- Security -->
                <div class="section-title">Security</div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Sanitize message content</div>
                        <div class="field-description">Injection defense — sanitize incoming Signal messages before they reach the LLM.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.security.sanitize_content"
                                x-init="if (config.security.sanitize_content === undefined) config.security.sanitize_content = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Strip prompt injection patterns</div>
                        <div class="field-description">Remove known injection patterns from incoming messages.</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.security.strip_injection_patterns"
                                x-init="if (config.security.strip_injection_patterns === undefined) config.security.strip_injection_patterns = true" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>

                <div class="field">
                    <div class="field-label">
                        <div class="field-title">Strict contact enforcement</div>
                        <div class="field-description">Reject messages from unknown senders (not in allowed contacts list).</div>
                    </div>
                    <div class="field-control">
                        <label class="toggle">
                            <input type="checkbox" x-model="config.security.strict_contact_enforcement" />
                            <span class="toggler"></span>
                        </label>
                    </div>
                </div>
            </div>
        </template>
    </div>
</body>
</html>
